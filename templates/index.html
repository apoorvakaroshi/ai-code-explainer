<!DOCTYPE html>
<html>
<head>
<title>LogicLens AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>LogicLens AI 👓</h1>

<p class="subtitle">
Paste your code and get explanation in your preferred language
</p>

<!-- Programming Language -->
<select id="languageSelect">
    <option value="auto">Auto Detect Language</option>
    <option value="python">Python</option>
    <option value="java">Java</option>
    <option value="cpp">C/C++</option>
    <option value="javascript">JavaScript</option>
</select>

<!-- Explanation Language -->
<select id="explainLang">
    <option value="english">English</option>
    <option value="kannada">Kannada</option>
    <option value="hindi">Hindi</option>
</select>

<textarea id="codeInput" placeholder="Paste your code here..."></textarea>

<button onclick="explainCode()">Explain Code</button>

<h2>Explanation:</h2>

<pre id="output">Your explanation will appear here...</pre>

</div>

<script>

async function explainCode(){

let code = document.getElementById("codeInput").value
let output = document.getElementById("output")
let language = document.getElementById("languageSelect").value
let explainLang = document.getElementById("explainLang").value

if(code.trim() === ""){
    output.innerText = "⚠️ Please enter some code first."
    return
}

output.innerText = "⏳ Generating explanation..."

try{

let response = await fetch("/explain",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
    code: code,
    language: language,
    lang: explainLang
})
})

let data = await response.json()

let langText = data.language ? `Language: ${data.language}\n\n` : ""

output.innerText = langText + (data.result || data.error)

}catch(error){
output.innerText = "❌ Failed to connect to server."
}

}

</script>

</body>
</html>
